    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #181818;
            font-family: 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ══════════════════════════════════════
           MAIN CONTENT — flows in normal doc
        ══════════════════════════════════════ */

        /* The fixed wrapper covers the whole viewport and is clipped */
        .diag-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        /* Dark vignette overlay so the glass card stays readable */
        .diag-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(24,24,24,0.55) 0%, rgba(24,24,24,0.82) 100%);
            z-index: 1;
        }

        /* Each strip is a horizontal scrolling row that we then rotate */
        .diag-strip {
            position: absolute;
            left: -60%;          /* extend past both edges after rotation */
            width: 220%;         /* wide enough to fill after rotation    */
            display: flex;
            gap: 14px;
            transform: rotate(-30deg);   /* "/" diagonal angle               */
            transform-origin: center center;
            will-change: transform;
        }

        /* Three strips stacked vertically (spread via top offset) */
        .diag-strip:nth-child(1) { top: -18%;  }
        .diag-strip:nth-child(2) { top:  28%;  }
        .diag-strip:nth-child(3) { top:  74%;  }

        /* Each strip scrolls left; alternate strips go right for variety */
        .diag-strip:nth-child(1) { animation: diagLeft  38s linear infinite; }
        .diag-strip:nth-child(2) { animation: diagRight 42s linear infinite; }
        .diag-strip:nth-child(3) { animation: diagLeft  35s linear infinite; }

        @keyframes diagLeft  { from { transform: rotate(-30deg) translateX(0);      }
                                to   { transform: rotate(-30deg) translateX(-50%);   } }
        @keyframes diagRight { from { transform: rotate(-30deg) translateX(-50%);   }
                                to   { transform: rotate(-30deg) translateX(0);      } }

        /* Individual poster tiles inside each strip */
        .diag-item {
            flex-shrink: 0;
            width: 200px;
            height: 280px;
            border-radius: 14px;
            overflow: hidden;
            opacity: 0.55;
            border: 2px solid rgba(255,255,255,0.06);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .diag-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        #page-content {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px 60px;
        }

        /* ── frosted glass card ── */
        .dual-container {
            width: 700px;
            max-width: 100%;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            background: rgba(24, 24, 24, 0.75);
            border-radius: 30px;
            padding: 40px 50px 36px;
            animation: fadeUp 0.7s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .dual-container h1 {
            font-family: 'Netflix Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: orange;
            font-weight: bold;
            margin-bottom: 6px;
            text-shadow: #000 0 0 13px;
            text-align: center;
        }

        .subtitle {
            color: #ccc;
            font-size: 13px;
            text-align: center;
            margin-bottom: 28px;
            letter-spacing: 0.5px;
        }

        /* search rows */
        .search-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .search-label {
            color: orange;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            width: 70px;
            text-align: right;
            flex-shrink: 0;
        }

        /* VS divider */
        .vs-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0 20px;
        }
        .vs-divider::before,
        .vs-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.15);
        }
        .vs-divider span {
            color: orange;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* buttons */
        .btn-row {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-top: 8px;
        }

        .btn-find {
            background: transparent;
            border: 2px solid red;
            color: white;
            border-radius: 8px;
            padding: 10px 36px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .btn-find:hover { background: red; color: #fff; }

        .btn-back {
            background: transparent;
            border: 2px solid #555;
            color: #aaa;
            border-radius: 8px;
            padding: 10px 28px;
            font-size: 14px;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        .btn-back:hover { border-color: orange; color: orange; text-decoration: none; }

        /* ══════════════════════════════════════
           RESULTS SECTION — full width below card
        ══════════════════════════════════════ */
        #dualResultsWrapper {
            width: 100%;
            max-width: 1200px;
            margin-top: 60px;
            padding: 30px 40px 40px;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            background: rgba(24, 24, 24, 0.75);
            border-radius: 30px;
        }

        #dualResultsWrapper h4 {
            color: #e8e8e8;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 3px;
            font-size: 15px;
            text-transform: uppercase;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        #movieGrid {
            display: flex !important;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px;
            padding-bottom: 40px;
        }

        .movie-card {
            width: 150px;
            text-align: center;
            cursor: pointer;
            border-radius: 14px;
            overflow: hidden;
            background: rgba(255,255,255,0.06);
            transition: transform 0.25s, box-shadow 0.25s;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .movie-card:hover {

        }
        .movie-card p {

        }

        }

        /* ── Film Reel Loader ── */
        #dualLoader {
            display: none;
            position: fixed;
            z-index: 9000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(18, 18, 18, 0.97);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
        }
        #dualLoader.active { display: flex; }
        .reel-wrap { position: relative; width: 90px; height: 90px; }
        .reel-ring {
            width: 90px; height: 90px;
            border-radius: 50%;
            border: 6px solid rgba(255,165,0,0.15);
            border-top-color: orange;
            animation: reelSpin 0.9s linear infinite;
            position: absolute; top: 0; left: 0;
        }
        .reel-ring-inner {
            width: 58px; height: 58px;
            border-radius: 50%;
            border: 4px solid rgba(255,165,0,0.1);
            border-bottom-color: #e53935;
            animation: reelSpin 1.3s linear infinite reverse;
            position: absolute; top: 10px; left: 10px;
        }
        .reel-center {
            width: 22px; height: 22px;
            background: orange; border-radius: 50%;
            position: absolute; top: 50%; left: 50%;

        }
        @keyframes reelSpin { to { transform: rotate(360deg); } }
        .dual-loader-movies { display: flex; align-items: center; gap: 14px; }
        .dlm-poster {

        @keyframes posterPulse {
            0%,100% { opacity:0.4; transform:scaleY(1); }

        }
        .dual-loader-text {
            color: #fff; font-size: 14px;

            animation: loaderPulse 1.4s ease-in-out infinite;
        }
        @keyframes loaderPulse { 0%,100%{opacity:0.4;} 50%{opacity:1;} }

        @media (max-width: 750px) {
            .dual-container { padding: 28px 20px; }
            #autoComplete, #autoComplete2 { width: 100% !important; }
            .search-label { display: none; }
            .movie-card { width: 130px; }
            .movie-card img { height: 180px; }
        }
    </style>

<style>
  body.zoom-exit {
    animation: zoomExitBody 0.55s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  @keyframes zoomExitBody {
    0%   { transform: scale(1);    filter: brightness(1); }
    60%  { transform: scale(1.08); filter: brightness(1.3); }
    100% { transform: scale(1.25); filter: brightness(0) blur(6px); opacity: 0; }
  }
  @keyframes zoomPunch {
    0%   { transform: scale(1);    filter: brightness(1); }
    50%  { transform: scale(1.06); filter: brightness(1.4); }
    100% { transform: scale(1);    filter: brightness(1); }
  }
</style>

<script>
  // Zoom-exit then navigate to a URL
  function zoomExit(originEl, url) {
    if (originEl) {
      const r = originEl.getBoundingClientRect();
      const ox = ((r.left + r.width  / 2) / window.innerWidth  * 100).toFixed(1) + '%';
      const oy = ((r.top  + r.height / 2) / window.innerHeight * 100).toFixed(1) + '%';
      document.documentElement.style.setProperty('--ox', ox);
      document.documentElement.style.setProperty('--oy', oy);
    }
    document.body.classList.add('zoom-exit');
    if (url) setTimeout(() => { window.location.href = url; }, 520);
  }

  // Find Movie button — punch zoom then let recommend.js handle it
  const findBtn = document.getElementById('dualBtn');
  if (findBtn) {
    findBtn.addEventListener('click', function() {
      document.body.style.animation = 'zoomPunch 0.35s cubic-bezier(0.4,0,0.2,1) forwards';
      setTimeout(() => { document.body.style.animation = ''; }, 360);
    }, true);
  }

  // Movie result cards — zoom exit then navigate to /?movie=...
  document.addEventListener('click', function(e) {
    const card = e.target.closest('.movie-card');
    if (!card) return;
    const movie = card.getAttribute('data-movie');
    if (!movie) return;
    e.stopImmediatePropagation();
    e.preventDefault();
    zoomExit(card, '/?movie=' + encodeURIComponent(movie));
  }, true);
</script>
